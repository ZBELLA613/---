{% extends 'base.html' %}
{% block content %}
<section class="page-head">
    <div>
        <h2>{{ '编辑课程' if course else '新增课程' }}</h2>
        <p>课程信息支持维护课程性质、学分、学时与适用专业。</p>
    </div>
</section>

<section class="panel">
    <form method="post" class="form-grid">
        <label>
            课程编号
            <input type="text" name="course_no" value="{{ course.course_no if course else '' }}" required>
        </label>
        <label>
            课程名称
            <input type="text" name="name" value="{{ course.name if course else '' }}" required>
        </label>
        <label>
            课程性质
            <select name="nature">
                {% for item in ['必修','选修','通识'] %}
                <option value="{{ item }}" {% if course and course.nature == item %}selected{% endif %}>{{ item }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            学分
            <input type="number" step="0.5" name="credits" value="{{ course.credits if course else '' }}">
        </label>
        <label>
            学时
            <input type="number" name="hours" value="{{ course.hours if course else '' }}">
        </label>
        <label>
            适用专业
            <input type="text" name="applicable_major" value="{{ course.applicable_major if course else '' }}">
        </label>
        <label class="full">
            课程说明
            <textarea name="description" rows="4">{{ course.description if course else '' }}</textarea>
        </label>
        <div class="full form-actions">
            <button type="submit">保存课程</button>
            <a class="secondary-btn" href="{{ url_for('course_list') }}">返回列表</a>
        </div>
    </form>
</section>
{% endblock %}
